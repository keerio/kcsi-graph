services:
  kcsi-graph:
    build: .
    container_name: kcsi-graph
    ports:
      - "3100:3000"
    environment:
      - BASEROW_DB_HOST=baserow
      - BASEROW_DB_NAME=baserow
      - BASEROW_DB_USER=baserow
      - BASEROW_DB_PASS=baserow
    networks:
      - arcane_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  arcane_default:
    external: true
